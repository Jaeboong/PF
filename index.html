<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김재환 포트폴리오 | Journey Line</title>
  <meta
    name="description"
    content="정합성과 구조 설계를 우선하는 백엔드 개발자의 학습, 프로젝트, 실무 경험을 시간순으로 정리한 포트폴리오."
  >
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23f0f0f0'/%3E%3Ccircle cx='14' cy='50' r='18' fill='%235293f6'/%3E%3Ccircle cx='52' cy='12' r='16' fill='%23a6c4f3'/%3E%3Cpath d='M32 10v44' stroke='%235293f6' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='28' r='6' fill='%235293f6'/%3E%3C/svg%3E"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700;800&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles/timeline.css">
  <script defer src="scripts/timeline.js"></script>
</head>
<body>
  <main class="portfolio-shell">
    <section class="hero" id="top" aria-labelledby="hero-title">
      <div class="hero__topline">
        <span>2026.</span>
        <span>Back-End Developer Portfolio</span>
        <a href="#timeline">Journey Line</a>
      </div>

      <div class="hero__body">
        <p class="hero__eyebrow">Build for Data Integrity.</p>
        <h1 class="hero__title" id="hero-title">
          <span class="hero__title-line" data-hero-fit>문제를 구조로 바꾸는</span>
          <span class="hero__title-line hero__title-line--accent" data-hero-fit>Back-End Developer.</span>
        </h1>
        <p class="hero__lede">
          정합성과 유지보수성을 우선하는 백엔드 개발자입니다.
        </p>
        <div class="hero__chips" aria-label="핵심 키워드">
          <span>정합성 우선</span>
          <span>구조 설계</span>
          <span>문제에서 실행까지</span>
        </div>
      </div>
    </section>

    <section class="timeline" id="timeline" aria-labelledby="timeline-title">
      <div class="timeline__intro">
        <p class="timeline__intro-label">Journey Line.</p>
        <h2 class="timeline__intro-title" id="timeline-title">
          주요 경험 흐름
          <span>2017.03 - 2026.04</span>
        </h2>
      </div>

      <div class="timeline__list" id="timeline-list" role="list"></div>
    </section>
  </main>
</body>
</html>
